<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Radhika & Sameer</title>
  <style>
    :root{--navy:#0a1f44;--gold:#c99a3b;--ivory:#fffdf8;--muted:#6e6256}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 15%,rgba(242,209,139,.35),transparent 30%),linear-gradient(135deg,#fffdf8,#fbf0de);color:var(--navy);padding:28px}
    .card{width:min(680px,100%);background:rgba(255,255,255,.72);border:1px solid rgba(201,154,59,.28);border-radius:34px;padding:42px 28px;text-align:center;box-shadow:0 26px 80px rgba(10,31,68,.14)}
    .eyebrow{display:inline-flex;gap:10px;align-items:center;border:1px solid rgba(201,154,59,.35);border-radius:999px;padding:9px 14px;background:#fff;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.76rem}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--gold);box-shadow:0 0 0 8px rgba(201,154,59,.14)}
    h1{font-family:Georgia,serif;font-size:clamp(2.6rem,8vw,5rem);line-height:.95;margin:28px 0 14px;letter-spacing:-.04em}
    p{font-size:1.1rem;line-height:1.7;color:var(--muted);margin:0 auto 18px;max-width:540px}
    .guj{font-family:Georgia,serif;color:#7a683f;font-size:1.18rem}
    a{display:inline-flex;margin-top:16px;text-decoration:none;background:linear-gradient(135deg,#f5d978,#c99a3b);color:#1d1a12;font-weight:900;border-radius:999px;padding:14px 22px;box-shadow:0 16px 34px rgba(201,154,59,.28)}
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow"><span class="dot"></span> RSVP Received</div>
    <h1>Thank You</h1>
    <p>Your RSVP has been submitted. We look forward to celebrating this special evening with you.</p>
    <p class="guj">તમારા જવાબ માટે ખુબ આભાર. આપની હાજરીની આતુરતાથી રાહ જોઇશું.</p>
    <a href="index.html">Back to Invitation</a>
  </main>
</body>
</html>
